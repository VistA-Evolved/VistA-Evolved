# SLO Definitions — VistA-Evolved
# Used by Sloth / Pyrra or manual Prometheus recording rules.
# Format: Sloth v0.11 specification.
#
# These SLOs define the minimum reliability targets.
# Each SLO generates recording + alerting rules when processed by `sloth generate`.

version: "prometheus/v1"
service: "vista-evolved-api"
labels:
  owner: "platform-team"
  repo: "vista-evolved"

slos:

  # ---- SLO-1: API Availability ----
  - name: "api-availability"
    objective: 99.5   # 99.5% over 30d window
    description: "API returns non-5xx responses for authenticated requests."
    sli:
      events:
        error_query: >
          sum(rate(http_requests_total{job="vista-evolved-api", code=~"5.."}[{{.window}}]))
        total_query: >
          sum(rate(http_requests_total{job="vista-evolved-api"}[{{.window}}]))
    alerting:
      name: "VEApiAvailabilitySLOBreach"
      labels:
        severity: "critical"
        team: "platform"
      annotations:
        summary: "API availability SLO (99.5%) at risk"
        runbook: "https://github.com/owner/vista-evolved/blob/main/infra/runbooks/incident-response.md"
      page_alert:
        labels:
          severity: "critical"
      ticket_alert:
        labels:
          severity: "warning"

  # ---- SLO-2: API Latency (p95 < 2s) ----
  - name: "api-latency-p95"
    objective: 95.0   # 95% of requests complete within 2s
    description: "95th percentile request latency stays below 2 seconds."
    sli:
      events:
        error_query: >
          sum(rate(http_request_duration_seconds_bucket{job="vista-evolved-api", le="2.0"}[{{.window}}]))
            -
          sum(rate(http_request_duration_seconds_count{job="vista-evolved-api"}[{{.window}}]))
        total_query: >
          sum(rate(http_request_duration_seconds_count{job="vista-evolved-api"}[{{.window}}]))
    alerting:
      name: "VEApiLatencySLOBreach"
      labels:
        severity: "warning"
        team: "platform"
      annotations:
        summary: "API p95 latency SLO (2s) at risk"
      page_alert:
        labels:
          severity: "critical"
      ticket_alert:
        labels:
          severity: "warning"

  # ---- SLO-3: RPC Broker Success Rate ----
  - name: "rpc-broker-success"
    objective: 99.0   # 99% RPC calls succeed
    description: "VistA RPC broker calls return success (no circuit breaker open)."
    sli:
      events:
        error_query: >
          sum(rate(rpc_calls_total{job="vista-evolved-api", status="error"}[{{.window}}]))
        total_query: >
          sum(rate(rpc_calls_total{job="vista-evolved-api"}[{{.window}}]))
    alerting:
      name: "VERpcBrokerSLOBreach"
      labels:
        severity: "warning"
        team: "platform"
      annotations:
        summary: "RPC broker success rate SLO (99%) at risk"
      page_alert:
        labels:
          severity: "critical"
      ticket_alert:
        labels:
          severity: "warning"

  # ---- SLO-4: Backup Success ----
  - name: "backup-success"
    objective: 99.9   # 99.9% (one failure per 1000 scheduled backups)
    description: "Scheduled database backups complete successfully."
    sli:
      events:
        error_query: >
          sum(rate(backup_result_total{job="vista-evolved-api", status="failure"}[{{.window}}]))
        total_query: >
          sum(rate(backup_result_total{job="vista-evolved-api"}[{{.window}}]))
    alerting:
      name: "VEBackupSLOBreach"
      labels:
        severity: "critical"
        team: "platform"
      annotations:
        summary: "Backup success SLO (99.9%) at risk — data loss risk"
      page_alert:
        labels:
          severity: "critical"
      ticket_alert:
        labels:
          severity: "warning"
