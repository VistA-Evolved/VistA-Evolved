---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ve-tenant-api
  namespace: {{ include "ve-tenant.namespace" . }}
  labels:
    {{- include "ve-tenant.labels" . | nindent 4 }}
    app.kubernetes.io/name: tenant-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tenant-api
      vista-evolved/tenant-slug: {{ .Values.tenantSlug | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenant-api
        app.kubernetes.io/part-of: vista-evolved
        vista-evolved/tenant-slug: {{ .Values.tenantSlug | quote }}
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: {{ .Values.metrics.path | quote }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            - configMapRef:
                name: tenant-config
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: STORE_BACKEND
              value: pg
            - name: PLATFORM_RUNTIME_MODE
              value: prod
            - name: PLATFORM_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tenant-secrets
                  key: PLATFORM_PG_PASSWORD
            - name: PLATFORM_PG_URL
              value: "postgresql://$(PLATFORM_PG_USER):$(PLATFORM_PG_PASSWORD)@$(PLATFORM_PG_HOST):$(PLATFORM_PG_PORT)/$(PLATFORM_PG_DB)"
            {{- range .Values.api.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ve-tenant-api
  namespace: {{ include "ve-tenant.namespace" . }}
  labels:
    {{- include "ve-tenant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tenant-api
    vista-evolved/tenant-slug: {{ .Values.tenantSlug | quote }}
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      name: http
