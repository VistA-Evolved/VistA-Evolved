# ve-tenant — Default values
# One release per tenant. Override tenantId/tenantSlug per install.

tenantId: ""
tenantSlug: ""
tenantNamespace: ""

global:
  sharedNamespace: ve-system
  imageRegistry: ""
  imagePullSecrets: []

# ---------- Tenant API ----------
api:
  image:
    repository: vista-evolved/api
    tag: dev
  replicas: 1
  port: 3001
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env: []
  # Extra env vars injected into the API container
  # - name: CUSTOM_VAR
  #   value: "custom-value"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilization: 70

# ---------- VistA / YottaDB ----------
vista:
  enabled: true
  image:
    repository: vista-evolved/vista-distro
    tag: dev
  port: 9430
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  storage:
    size: 5Gi
    storageClass: ""

# ---------- Backup CronJob ----------
backup:
  enabled: false
  schedule: "0 3 * * *"
  s3Bucket: ""
  s3Endpoint: ""
  retention:
    keepDays: 7

# ---------- Network Policies ----------
networkPolicies:
  enabled: false

# ---------- Pod Disruption Budget ----------
pdb:
  enabled: false
  minAvailable: 1

# ---------- Prometheus scraping ----------
metrics:
  enabled: true
  port: 3001
  path: /metrics/prometheus
