{{- if .Values.ingress.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ve-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
spec:
  replicas: {{ .Values.ingress.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: vista-evolved
    spec:
      securityContext:
        runAsNonRoot: false  # nginx needs root for port binding; use unprivileged image in prod
      containers:
        - name: nginx
          image: {{ .Values.ingress.image.repository }}:{{ .Values.ingress.image.tag }}
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          resources:
            {{- toYaml .Values.ingress.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ve-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - port: 80
      targetPort: http
      name: http
      nodePort: 30080
    - port: 443
      targetPort: https
      name: https
      nodePort: 30443
{{- end }}
