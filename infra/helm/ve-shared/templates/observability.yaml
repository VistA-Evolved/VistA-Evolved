{{- if .Values.observability.enabled }}
---
# OTel Collector — receives traces/metrics and forwards to Jaeger + Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ve-otel-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
    app.kubernetes.io/name: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: vista-evolved
    spec:
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8889
              name: prom-export
            - containerPort: 13133
              name: health
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ve-otel-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - port: 4317
      targetPort: otlp-grpc
      name: otlp-grpc
    - port: 4318
      targetPort: otlp-http
      name: otlp-http
    - port: 8889
      targetPort: prom-export
      name: prom-export
---
# Jaeger — trace visualization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ve-jaeger
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
    app.kubernetes.io/name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/part-of: vista-evolved
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/jaeger:2.4.0
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 14250
              name: grpc
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ve-jaeger
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - port: 16686
      targetPort: ui
      name: ui
    - port: 14250
      targetPort: grpc
      name: grpc
---
# Prometheus — metrics scraping
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ve-prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: vista-evolved
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
              name: http
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ve-prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: http
      name: http
{{- end }}
