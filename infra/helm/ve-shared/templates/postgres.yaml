{{- if .Values.postgres.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: ve-shared-pg
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.postgres.existingSecret }}
  # Using existing secret — this placeholder is overridden by existingSecret reference
  {{- else }}
  password: {{ "changeme-in-production" | b64enc | quote }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ve-pg-data
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.postgres.storage.storageClass }}
  storageClassName: {{ .Values.postgres.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ve-platform-db
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
    app.kubernetes.io/name: platform-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-db
        app.kubernetes.io/part-of: vista-evolved
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret | default "ve-shared-pg" }}
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user }}
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user }}
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: ve-pg-data
---
apiVersion: v1
kind: Service
metadata:
  name: ve-platform-db
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ve-shared.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: platform-db
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
{{- end }}
