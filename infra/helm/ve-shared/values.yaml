# ve-shared — Default values
# Each sub-component can be disabled for external/managed alternatives.

global:
  namespace: ve-system
  imageRegistry: ""
  imagePullSecrets: []

# ---------- Ingress (nginx) ----------
ingress:
  enabled: true
  className: nginx
  image:
    repository: nginx
    tag: "1.27-alpine"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------- Platform PostgreSQL ----------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  database: ve_platform
  user: ve_api
  # Password read from secret "ve-shared-pg" key "password"
  existingSecret: ""
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  backup:
    enabled: false
    schedule: "0 2 * * *"
    s3Bucket: ""
    s3Endpoint: ""

# ---------- Redis ----------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------- Keycloak ----------
keycloak:
  enabled: false
  # When enabled, installs a lightweight Keycloak with PG backend.
  # For production, use an external Keycloak and set keycloak.external.*
  external:
    url: ""
    realm: "vista-evolved"

# ---------- Observability ----------
observability:
  enabled: false
  # When enabled, deploys OTel collector + Prometheus + Grafana stubs.
  # For production, point to external Grafana Cloud / Datadog / etc.
  prometheus:
    scrapeInterval: 15s
  otelCollector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.96.0"

# ---------- MinIO (dev object storage for backups) ----------
minio:
  enabled: false
  image:
    repository: minio/minio
    tag: "latest"
  storage:
    size: 5Gi
    storageClass: ""
  # Credentials: override via --set or existingSecret in staging/prod.
  # Defaults below are for local dev only.
  rootUser: minioadmin
  # Password: set via --set minio.rootPassword=xxx or use existingSecret in prod
  rootPassword: ""

# ---------- Network Policies ----------
networkPolicies:
  enabled: false
  # Enabled by default in staging/prod overlays, disabled for kind/dev

# ---------- Pod Security ----------
podSecurityStandards:
  enforce: baseline
