# Phase 254 -- Resilience Certification CI
# Runs static resilience tests + drill validation on push/PR + nightly
name: resilience-certification

on:
  workflow_dispatch:

jobs:
  resilience-static:
    runs-on: ubuntu-latest
    name: Resilience Static Certification
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run resilience certification tests
        run: |
          cd apps/api
          pnpm exec vitest run tests/resilience-certification.test.ts --reporter=verbose
        env:
          NODE_ENV: test

      - name: Verify drill scripts exist
        run: |
          test -f ops/drills/resilience-drills.ts
          test -f ops/drills/run-vista-down-drill.ps1
          test -f ops/drills/run-circuit-breaker-drill.ps1
          test -f ops/drills/run-health-readiness-drill.ps1
          test -f ops/drills/run-posture-audit-drill.ps1

      - name: Verify resilience modules present
        run: |
          test -f apps/api/src/lib/rpc-resilience.ts
          test -f apps/api/src/vista/rpcBrokerClient.ts
          test -f apps/api/src/middleware/security.ts
          test -d apps/api/src/posture
