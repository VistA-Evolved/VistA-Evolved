# VistA-Evolved -- CI: Distro Build Validation
#
# Phase 288: Validates the VistA distro Dockerfile builds cleanly.
# Does NOT start VistA or run RPCs -- just validates the build pipeline.

name: CI - Distro Build

on:
  push:
    paths:
      - 'services/vista-distro/**'
      - '.hadolint.yaml'
  pull_request:
    paths:
      - 'services/vista-distro/**'
      - '.hadolint.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/vista-distro/Dockerfile
          config: .hadolint.yaml

  validate-build-env:
    name: Validate build.env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check pinned refs
        run: |
          source services/vista-distro/build.env
          echo "VISTA_ROUTINE_REF=$VISTA_ROUTINE_REF"
          if [ "$VISTA_ROUTINE_REF" = "master" ] || [ "$VISTA_ROUTINE_REF" = "main" ]; then
            echo "::error::VISTA_ROUTINE_REF must be pinned to a commit hash, not a branch name"
            exit 1
          fi
          echo "Build env validated: ref=$VISTA_ROUTINE_REF"

  build:
    name: Docker Build (dry)
    runs-on: ubuntu-latest
    needs: [lint, validate-build-env]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build distro image (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/vista-distro
          file: services/vista-distro/Dockerfile
          push: false
          tags: vista-evolved/vista-distro:ci-${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
