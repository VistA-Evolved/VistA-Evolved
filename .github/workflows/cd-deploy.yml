name: CD Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: cd-deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a deploy mid-flight

permissions:
  contents: write    # For GitOps promotion commits
  packages: write    # For GHCR publish
  id-token: write    # For cosign OIDC signing (optional)

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/vista-evolved

jobs:
  # ---- Build + Scan + Push images ----
  build-images:
    name: Build & Publish Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      api-digest: ${{ steps.push-api.outputs.digest }}
      web-digest: ${{ steps.push-web.outputs.digest }}
      portal-digest: ${{ steps.push-portal.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- API image ----
      - name: Build + push API
        id: push-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Web image ----
      - name: Build + push Web
        id: push-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Portal image ----
      - name: Build + push Portal
        id: push-portal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/portal/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Trivy vulnerability scan ----
  trivy-scan:
    name: Trivy Scan
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: [api, web, portal]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (${{ matrix.image }})
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.build-images.outputs.image-tag }}"
          format: json
          output: "trivy-${{ matrix.image }}.json"
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "trivy-${{ matrix.image }}"
          path: "trivy-${{ matrix.image }}.json"
          retention-days: 30

  # ---- SBOM per image ----
  sbom:
    name: SBOM
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (API image)
        run: |
          syft "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ needs.build-images.outputs.image-tag }}" \
            -o spdx-json=sbom-api.spdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-release
          path: sbom-*.spdx.json
          retention-days: 90

  # ---- GitOps promotion to staging ----
  promote-staging:
    name: Promote to Staging
    needs: [build-images, trivy-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update staging image tags
        run: |
          TAG="${{ needs.build-images.outputs.image-tag }}"
          # Update shared values
          sed -i "s/^imageTag:.*/imageTag: \"$TAG\"/" infra/environments/staging/shared.values.yaml
          # Update tenant defaults
          sed -i "s/^    tag: .*/    tag: \"$TAG\"/" infra/environments/staging/tenant.defaults.values.yaml

      - name: Commit staging promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/environments/staging/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(gitops): promote ${{ needs.build-images.outputs.image-tag }} to staging"
          git push

  # ---- Production promotion (requires PR) ----
  promote-prod-pr:
    name: Create Prod Promotion PR
    needs: [build-images, trivy-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Update prod image tags
        run: |
          TAG="${{ needs.build-images.outputs.image-tag }}"
          sed -i "s/^imageTag:.*/imageTag: \"$TAG\"/" infra/environments/prod/shared.values.yaml
          sed -i "s/^    tag: .*/    tag: \"$TAG\"/" infra/environments/prod/tenant.defaults.values.yaml

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          title: "release: promote ${{ needs.build-images.outputs.image-tag }} to production"
          body: |
            ## Production Promotion
            - Image tag: `${{ needs.build-images.outputs.image-tag }}`
            - Trivy scan: passed
            - SBOM: attached to workflow artifacts
            
            **Merge this PR to deploy to production via ArgoCD.**
          branch: "promote/prod-${{ needs.build-images.outputs.image-tag }}"
          commit-message: "chore(gitops): promote ${{ needs.build-images.outputs.image-tag }} to prod"
