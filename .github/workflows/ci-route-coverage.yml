name: CI Route Coverage

on:
  pull_request:
    paths:
      - 'apps/api/src/routes/**'
      - 'apps/api/src/server/register-routes.ts'
      - 'apps/api/src/vista/rpcRegistry.ts'
      - 'apps/web/src/components/vista/**'
      - 'apps/web/src/lib/vista-panel-registry.ts'

permissions:
  contents: read

jobs:
  route-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (API)
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: TypeScript check (Web)
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Verify panel registry completeness
        run: |
          PANEL_DIRS=$(find apps/web/src/components/vista -mindepth 1 -maxdepth 1 -type d | wc -l)
          REGISTRY_COUNT=$(grep -c "{ id:" apps/web/src/lib/vista-panel-registry.ts)
          echo "Panel directories: $PANEL_DIRS"
          echo "Registry entries:  $REGISTRY_COUNT"
          if [ "$PANEL_DIRS" -gt "$REGISTRY_COUNT" ]; then
            echo "WARN: More panel directories ($PANEL_DIRS) than registry entries ($REGISTRY_COUNT)"
            echo "Some panels may not be loadable from the workspace."
          fi

      - name: Verify route registration
        run: |
          ROUTE_FILES=$(find apps/api/src/routes -name "*.ts" | wc -l)
          IMPORTS=$(grep -c "import\|register" apps/api/src/server/register-routes.ts || true)
          echo "Route files: $ROUTE_FILES"
          echo "Register-routes imports/registers: $IMPORTS"

      - name: Build web app
        run: npx next build
        working-directory: apps/web
