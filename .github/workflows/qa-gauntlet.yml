name: QA Gauntlet

on:
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to run (fast/rc/full)'
        required: false
        default: 'rc'

concurrency:
  group: qa-gauntlet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- PR gates: FAST suite ----
  gauntlet-fast:
    name: Gauntlet FAST
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'

      - uses: pnpm/action-setup@v4
        with:
          version: '10.29.2'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run QA Gauntlet (FAST)
        run: pnpm qa:gauntlet:fast

      - name: Upload gauntlet results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-gauntlet-fast
          path: artifacts/qa-gauntlet.json
          retention-days: 7

  # ---- Nightly / manual: RC suite with --strict ----
  gauntlet-rc:
    name: Gauntlet RC (Strict)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'

      - uses: pnpm/action-setup@v4
        with:
          version: '10.29.2'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run QA Gauntlet (RC + Strict)
        run: node qa/gauntlet/cli.mjs --suite ${{ github.event.inputs.suite || 'rc' }} --strict --ci

      - name: Regenerate phase tests (Phase 144 V2)
        run: |
          node scripts/build-phase-index.mjs
          node scripts/qa/generate-phase-tests.mjs
          node scripts/qa/rpc-trace-manager.mjs verify

      - name: Evidence gate (strict - nightly)
        run: node scripts/qa-gates/evidence-gate.mjs --strict

      - name: Upload gauntlet results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-gauntlet-rc
          path: artifacts/qa-gauntlet.json
          retention-days: 7
