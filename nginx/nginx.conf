# VistA-Evolved — nginx reverse proxy configuration (production)
#
# This configuration provides:
#   - TLS termination via nginx/tls.conf (mount certs + include tls.conf)
#   - HTTP-only fallback for environments without TLS
#   - Proxy to API (Fastify) and Web (Next.js)
#   - Security headers
#   - WebSocket upgrade support for /ws/*
#
# TLS setup:
#   1. Generate or obtain certs (see infra/tls/mkcert-bootstrap.ps1)
#   2. Mount certs at /etc/nginx/certs/cert.pem and key.pem
#   3. Mount nginx/tls.conf at /etc/nginx/conf.d/tls.conf
#   The TLS server block in tls.conf handles port 443 + HSTS + redirect.
#   When TLS is active, this file's port-80 block becomes a fallback only.

events {
    worker_connections 1024;
}

http {
    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    60s;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream definitions
    upstream api_backend {
        server api:3001;
    }

    upstream web_backend {
        server web:3000;
    }

    # Include TLS server block when certs are mounted.
    # This file is only present when TLS is configured.
    include /etc/nginx/conf.d/*.conf;

    # HTTP-only server block (fallback when TLS not configured,
    # or redirect target when tls.conf is active)
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # API routes
        location /auth/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        location /vista/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        location ~ ^/(health|ready|metrics|version|admin|audit|posture|rcm|imaging|telehealth|analytics|iam|scheduling|intake|portal|api|fhir|hl7|security|hardening)(/|$) {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        # SMART / OIDC discovery
        location /.well-known/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        # WebSocket console
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_read_timeout 3600s;
        }

        # Web frontend (catch-all)
        location / {
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
