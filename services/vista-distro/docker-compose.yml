# =============================================================================
# VistA Distro Lane -- Docker Compose
# =============================================================================
# Full VistA container from reproducible build with SSH terminal access.
#
# Usage:
#   docker compose --profile distro up -d
#
# This runs alongside (NOT replacing) the dev sandbox in services/vista/.
# To switch your API to this instance, set:
#   VISTA_HOST=127.0.0.1
#   VISTA_PORT=9431
#
# SECURITY:
#   - Credentials are NOT in this file (use .env or Docker secrets)
#   - RPC Broker on port 9431 (mapped from internal 9430)
#   - SSH on port 2223 (mapped from internal 22) for terminal mode
# =============================================================================

services:
  vista-distro:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VISTA_ROUTINE_REF: ${VISTA_ROUTINE_REF:-master}
    image: vista-evolved/vista-distro:latest
    container_name: vista-distro
    profiles: ["distro"]
    ports:
      # RPC Broker: 9431 externally to avoid conflict with dev sandbox on 9430
      - "${VISTA_DISTRO_PORT:-9431}:${VISTA_BROKER_PORT:-9430}"
      # SSH: 2223 externally for terminal access (xterm.js WebSocket proxy)
      - "${VISTA_DISTRO_SSH_PORT:-2223}:22"
    environment:
      - VISTA_ADMIN_ACCESS=${VISTA_DISTRO_ACCESS:-}
      - VISTA_ADMIN_VERIFY=${VISTA_DISTRO_VERIFY:-}
      - VISTA_BROKER_PORT=${VISTA_BROKER_PORT:-9430}
      - VISTA_SSH_ENABLED=${VISTA_SSH_ENABLED:-true}
    volumes:
      # Persist VistA database across restarts
      - vista-distro-data:/opt/vista/g
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["/opt/vista/health-check.sh"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

volumes:
  vista-distro-data:
    driver: local
