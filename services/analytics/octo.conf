// VistA-Evolved Analytics -- Octo/ROcto Configuration
// Phase 25 -- BI Analytics SQL Layer
//
// Overrides from the default /opt/yottadb/current/plugin/octo/octo.conf:
//   1. rocto.address = "0.0.0.0"  -- allow connections from Docker host
//   2. rocto.port = 1338         -- match docker-compose port mapping
//   3. authentication_method = "md5" -- require password for BI/ETL users
//
// IMPORTANT: In production, restrict address to the BI subnet or use
// a reverse proxy with TLS termination.

emulate = "POSTGRES"
verbosity = "ERROR"

rocto = {
  address = "0.0.0.0"
  port = 1338
  use_dns = false
  tcp_delay = false
  authentication_method = "md5"
  ssl_on = false
  ssl_required = false
}

octo_history = "~/.octo_history"
octo_history_max_length = 500
