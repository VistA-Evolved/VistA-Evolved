# VistA-Evolved — Production Docker Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Multi-instance usage (Phase 117):
#   docker compose -f docker-compose.prod.yml up -d --scale api=2
#
# Prerequisites:
#   - Create .env.prod from .env.example and fill in credentials
#   - VistA sandbox must be accessible (either via services/vista or remote)
#
# Architecture:
#   nginx (reverse proxy, TLS termination) → api-1, api-2 (Fastify) + web (Next.js)
#   api → platform-db (PostgreSQL 16) + VistA RPC Broker (port 9430)
#
# Phase 117: All durable state uses PostgreSQL in prod. SQLite is NOT used.

services:
  # ---------- Platform PostgreSQL (shared state for multi-instance) ----------
  platform-db:
    image: postgres:16-alpine
    container_name: ve-platform-db-prod
    environment:
      POSTGRES_DB: ${PLATFORM_PG_DB:-ve_platform}
      POSTGRES_USER: ${PLATFORM_PG_USER:-ve_api}
      POSTGRES_PASSWORD: ${PLATFORM_PG_PASSWORD:?Set PLATFORM_PG_PASSWORD in .env.prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/platform-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_PG_USER:-ve_api} -d ${PLATFORM_PG_DB:-ve_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
    # PITR: enable WAL archiving in production by mounting a wal-archive volume
    # and adding: -c archive_mode=on -c archive_command='cp %p /wal-archive/%f'
    # to the command. See docs/runbooks/pg-backup-pitr.md for full guide.

  # ---------- Reverse proxy (TLS termination placeholder) ----------
  proxy:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount TLS certs here:
      # - ./certs/cert.pem:/etc/nginx/certs/cert.pem:ro
      # - ./certs/key.pem:/etc/nginx/certs/key.pem:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

  # ---------- API server (Fastify) — scalable: --scale api=2 ----------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      # PostgreSQL (Phase 117): ALL durable state in PG, no SQLite in prod
      # Connection assembled at runtime from components (secret-scan safe)
      - PLATFORM_PG_HOST=platform-db
      - PLATFORM_PG_PORT=5432
      - PLATFORM_PG_USER=${PLATFORM_PG_USER:-ve_api}
      - PLATFORM_PG_PASSWORD=${PLATFORM_PG_PASSWORD}
      - PLATFORM_PG_DB=${PLATFORM_PG_DB:-ve_platform}
      - STORE_BACKEND=pg
      - PLATFORM_PG_RLS_ENABLED=${PLATFORM_PG_RLS_ENABLED:-true}
      # VistA connection (from .env.prod or secrets manager)
      - VISTA_HOST=${VISTA_HOST:-vista}
      - VISTA_PORT=${VISTA_PORT:-9430}
      - VISTA_ACCESS_CODE=${VISTA_ACCESS_CODE}
      - VISTA_VERIFY_CODE=${VISTA_VERIFY_CODE}
      - VISTA_CONTEXT=${VISTA_CONTEXT:-OR CPRS GUI CHART}
      # Observability
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=json
      - AUDIT_SINK=file
      - AUDIT_FILE_PATH=/app/logs/audit.jsonl
      # Security
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://ehr.local}
      - SESSION_COOKIE=ehr_session
      # Performance
      - RPC_CALL_TIMEOUT_MS=${RPC_CALL_TIMEOUT_MS:-15000}
      - CACHE_DEFAULT_TTL_MS=${CACHE_DEFAULT_TTL_MS:-60000}
      # Job runner (only first instance should run jobs; use JOB_WORKER_ENABLED=true selectively)
      - JOB_WORKER_ENABLED=${JOB_WORKER_ENABLED:-false}
    volumes:
      - api-logs:/app/logs
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      platform-db:
        condition: service_healthy
    networks:
      - frontend
      - backend

  # ---------- Web frontend (Next.js) ----------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:3001
        BUILD_SHA: ${BUILD_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend

  # ---------- Orthanc DICOM server (optional, Phase 156) ----------
  # Enable with: docker compose -f docker-compose.prod.yml --profile imaging up -d
  orthanc:
    image: orthancteam/orthanc:25.12.3-full
    container_name: ve-orthanc-prod
    profiles: ["imaging"]
    volumes:
      - orthanc-data:/var/lib/orthanc/db
      - ./services/imaging/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./services/imaging/on-stable-study.lua:/etc/orthanc/on-stable-study.lua:ro
    environment:
      - ORTHANC_NAME=VistA-Evolved-Imaging
      - VERBOSE_ENABLED=true
      - INGEST_CALLBACK_URL=http://api:3001/imaging/ingest/callback
      - INGEST_SERVICE_KEY=${IMAGING_INGEST_WEBHOOK_SECRET:-dev-imaging-ingest-key-change-in-production}
    expose:
      - "8042"
      - "4242"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8042/system"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend

  # ---------- OHIF DICOM viewer (optional, Phase 156) ----------
  ohif-viewer:
    image: ohif/app:latest
    container_name: ve-ohif-prod
    profiles: ["imaging"]
    volumes:
      - ./services/imaging/ohif-config.js:/usr/share/nginx/html/app-config.js:ro
    depends_on:
      orthanc:
        condition: service_healthy
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend

volumes:
  api-logs:
    driver: local
  pgdata:
    driver: local
  orthanc-data:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
